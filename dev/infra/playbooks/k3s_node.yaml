- name: K3s Node
  hosts: all
  become: yes
  tasks:

    - name: Update
      apt: state=latest force_apt_get=yes

    - name: Install k3s
      shell: |
        curl -sfL https://get.k3s.io | \
        K3S_URL=https://{{k3s_url}}:6443 \
        K3S_TOKEN={{k3s_token}} \
        K3S_NODE_NAME={{node_name}} \
        sh -
      args:
        creates: /usr/local/bin/k3s
